<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Segway Centaur Project</title>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#333;
    color:white;
    padding:20px;
    text-align:center;
}

main{
    max-width:800px;
    margin:auto;
    padding:30px;
    background:white;
}

h1{
    margin-top:0;
}

form{
    margin-top:20px;
}

label{
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    background:#333;
    color:white;
    padding:12px 20px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#555;
}

footer{
    text-align:center;
    padding:20px;
    font-size:0.9em;
    color:#666;
}
</style>
</head>

<body>

<header>
<h1>Contact</h1>
<p>Segway Centaur Project</p>
</header>

<main>

<p>If you'd like to reach out about this project or my work, you can send a message using the form below.</p>

<form action="https://formspree.io/f/xeerrplr" method="POST">

<label for="name">Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="message">Message</label>
<textarea id="message" name="message" rows="6" required></textarea>

<button type="submit">Send Message</button>

</form>

<hr>

<p>
If the form above doesn't work, you can also contact me directly at  
<a href="mailto:rsago@ualr.edu">rsago@uarl.edu</a>.
</p>

</main>

<footer>
<p>© 2022 Robert Sago</p>
</footer>

</body>
</html>
